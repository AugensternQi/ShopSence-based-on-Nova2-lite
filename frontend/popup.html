<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSense AI</title>
    <style>
      :root {
        --bg: #f8fafc;
        --text: #1e293b;
        --muted: #64748b;
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --panel: #ffffff;
        --border: #e2e8f0;
        --ring: rgba(79, 70, 229, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 360px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      main {
        padding: 20px;
      }

      header {
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        color: var(--primary);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      #summarizeBtn {
        width: 100%;
        border: none;
        border-radius: 12px;
        background: var(--primary);
        color: #fff;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease, transform 0.08s ease, box-shadow 0.2s ease;
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.2);
      }

      #summarizeBtn:hover {
        background: var(--primary-hover);
      }

      #summarizeBtn:active {
        transform: translateY(1px);
      }

      #summarizeBtn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--ring);
      }

      #summarizeBtn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #loadingSpinner {
        margin-top: 14px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--muted);
        font-size: 14px;
      }

      #loadingSpinner.hidden {
        display: none;
      }

      .spinner-dot {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid #cbd5e1;
        border-top-color: var(--primary);
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      section {
        margin-top: 14px;
      }

      #result {
        min-height: 84px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        padding: 14px;
        color: #334155;
        font-size: 14px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>ShopSense AI</h1>
        <p class="subtitle">Instant AI summary for the current Amazon product page.</p>
      </header>

      <button id="summarizeBtn">
        Summarize Current Product
      </button>

      <div id="loadingSpinner" class="hidden">
        <span class="spinner-dot" aria-hidden="true"></span>
        <span>Generating summary...</span>
      </div>

      <section>
        <div id="result">
          Open an Amazon product page, then click "Summarize Current Product".
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
